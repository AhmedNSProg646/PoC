<!DOCTYPE html>
<html>
<body>
    <script>
        // تحويل الـ JSON لـ String وحطه في الـ URL كـ Parameter
        const payload = '{"Item":"Test Vanilla Ice Cream","Quantity":7,"WeightRequiresConfirmation":false,"Pack":null,"PackSelection":"","options":null,"HasItemOptions":false,"Recommendation":{}}';
        
        // جرب تبعتها كـ query parameter اسمه 'data' أو 'item' أو حتى بدون اسم
        window.location.href = "https://template.uat.foodstorm.com/cart/add?data=" + encodeURIComponent(payload);
    </script>
</body>
</html>
